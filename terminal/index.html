<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://esm.sh/@xterm/xterm@5.5.0/css/xterm.css">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      /* Background is driven by JS so the whole tab matches the terminal theme. */
      background: #141414;
    }
    html {
      --terminal-edge-bg: #141414;
      --terminal-cursor-bg: #ffffff;
      --terminal-cursor-fg: #141414;
    }
    #terminal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-synthesis: none;
      font-kerning: none;
      font-variant-ligatures: none;
      letter-spacing: 0;
      word-spacing: 0;
    }
    #terminal,
    #terminal .xterm,
    #terminal .xterm-viewport,
    #terminal .xterm-screen,
    #terminal .xterm-rows {
      background: var(--terminal-edge-bg) !important;
    }
    #terminal .xterm {
      overflow: hidden;
    }
    #terminal .xterm-rows,
    #terminal .xterm-rows span {
      font-kerning: none;
      font-variant-ligatures: none;
      letter-spacing: 0;
      word-spacing: 0;
    }
    @keyframes terminal-dom-block-cursor-blink {
      0% {
        background-color: var(--terminal-cursor-bg);
        color: var(--terminal-cursor-fg);
      }
      50% {
        background-color: var(--terminal-cursor-cell-bg, var(--terminal-edge-bg));
        color: var(--terminal-cursor-cell-fg, inherit);
      }
    }
    #terminal .xterm-rows.xterm-focus .xterm-cursor.xterm-cursor-blink.xterm-cursor-block {
      animation: terminal-dom-block-cursor-blink 1s step-end infinite !important;
    }
    #terminal .xterm-viewport {
      scrollbar-width: none;
    }
    #terminal .xterm-viewport::-webkit-scrollbar {
      width: 0;
      height: 0;
    }
    #drop-overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: color-mix(in srgb, var(--terminal-edge-bg), transparent 18%);
      border: 1px solid #5f86b3;
      color: #e5e5e5;
      font: 13px "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      pointer-events: none;
      z-index: 10;
    }
    #drop-overlay.visible {
      display: grid;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <div id="drop-overlay">Drop files to attach</div>

  <script type="module">
    // xterm + fit via esm.sh (zero build, reliable CDN for MVP)
    import { Terminal } from 'https://esm.sh/@xterm/xterm@5.5.0';
    import { FitAddon } from 'https://esm.sh/@xterm/addon-fit@0.11';

    const grokNight = {
      background: '#141414',
      foreground: '#e5e5e5',
      cursor: '#ffffff',
      cursorAccent: '#141414',
      selectionBackground: '#343541',
      black: '#141414',
      red: '#f87171',
      green: '#4ade80',
      yellow: '#fde047',
      blue: '#60a5fa',
      magenta: '#c084fc',
      cyan: '#67e8f9',
      white: '#e5e5e5',
      brightBlack: '#52525b',
      brightRed: '#fca5a5',
      brightGreen: '#86efac',
      brightYellow: '#fef08c',
      brightBlue: '#93c5fd',
      brightMagenta: '#d8b4fe',
      brightCyan: '#a5f3fc',
      brightWhite: '#fafafa',
    };

    const grokDay = {
      background: '#fafafa',
      foreground: '#171717',
      cursor: '#111111',
      cursorAccent: '#fafafa',
      selectionBackground: '#d4d4d8',
      black: '#262626',
      red: '#dc2626',
      green: '#16a34a',
      yellow: '#ca8a04',
      blue: '#2563eb',
      magenta: '#9333ea',
      cyan: '#0891b2',
      white: '#e5e5e5',
      brightBlack: '#737373',
      brightRed: '#ef4444',
      brightGreen: '#22c55e',
      brightYellow: '#eab308',
      brightBlue: '#3b82f6',
      brightMagenta: '#a855f7',
      brightCyan: '#06b6d4',
      brightWhite: '#ffffff',
    };

    function getSystemTheme() {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      return prefersDark ? grokNight : grokDay;
    }

    let currentTheme = getSystemTheme();

    function applyTheme(theme) {
      currentTheme = theme;
      term.options.theme = theme;
      // Make the entire page (including any area around the xterm canvas) match perfectly
      document.documentElement.style.background = theme.background;
      document.body.style.background = theme.background;
      document.documentElement.style.setProperty('--terminal-edge-bg', theme.background);
      document.documentElement.style.setProperty('--terminal-cursor-bg', theme.cursor);
      document.documentElement.style.setProperty('--terminal-cursor-fg', theme.cursorAccent);
    }

    function updateThemeFromSystem() {
      applyTheme(getSystemTheme());
    }

    const params = new URLSearchParams(location.search);
    const cursorParam = params.get('cursor');
    const blinkParam = params.get('blink');
    if (cursorParam === 'bar' || cursorParam === 'block' || cursorParam === 'underline') {
      localStorage.setItem('grok-terminal-cursor', cursorParam);
    }
    const cursorStyle = cursorParam === 'bar' || cursorParam === 'underline'
      ? cursorParam
      : 'block';
    if (!cursorParam) {
      localStorage.removeItem('grok-terminal-cursor');
    }

    const term = new Terminal({
      cursorBlink: blinkParam === '1' || blinkParam === 'true',
      cursorStyle,
      fontSize: 13,
      fontFamily: '"Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace',
      lineHeight: 1,
      letterSpacing: 0,
      mouseEvents: true,
      scrollback: 10000,
      fastScrollModifier: 'alt',
      rightClickSelectsWord: false,
      termName: 'xterm-256color',
      drawBoldTextInBrightColors: true,
      minimumContrastRatio: 1,
      customGlyphs: true,
      theme: getSystemTheme(),
      allowTransparency: false,
    });

    const fitAddon = new FitAddon();
    term.loadAddon(fitAddon);

    const container = document.getElementById('terminal');
    const dropOverlay = document.getElementById('drop-overlay');
    term.open(container);
    let canvasAddon;
    try {
      if (params.get('renderer') === 'canvas') {
        const { CanvasAddon } = await import('https://esm.sh/@xterm/addon-canvas@0.7.0');
        canvasAddon = new CanvasAddon();
        term.loadAddon(canvasAddon);
        console.log('%c[Mission Control] renderer: canvas (forced)', 'color:#555');
      } else {
        console.log('%c[Mission Control] renderer: DOM', 'color:#555');
      }
    } catch (error) {
      console.warn('[Mission Control] canvas renderer failed; using DOM renderer', error);
    }

    const cursorProbeClasses = [
      'xterm-cursor',
      'xterm-cursor-blink',
      'xterm-cursor-block',
      'xterm-cursor-bar',
      'xterm-cursor-underline',
      'xterm-cursor-outline',
    ];

    function syncDomCursorCellColors() {
      const cursor = container.querySelector('.xterm-rows .xterm-cursor.xterm-cursor-block');
      if (!cursor || !cursor.parentElement) return;

      const probe = cursor.cloneNode(false);
      for (const className of cursorProbeClasses) {
        probe.classList.remove(className);
      }
      probe.textContent = cursor.textContent || ' ';
      probe.style.animation = 'none';
      probe.style.position = 'absolute';
      probe.style.left = '-9999px';
      probe.style.top = '-9999px';
      probe.style.visibility = 'hidden';
      probe.style.pointerEvents = 'none';

      cursor.parentElement.appendChild(probe);
      const style = getComputedStyle(probe);
      cursor.style.setProperty('--terminal-cursor-cell-bg', style.backgroundColor);
      cursor.style.setProperty('--terminal-cursor-cell-fg', style.color);
      probe.remove();
    }

    // Apply the correct terminal theme + body background immediately after open.
    // Then listen for live system theme changes (user flips OS dark/light mode).
    updateThemeFromSystem();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateThemeFromSystem);
    requestAnimationFrame(syncDomCursorCellColors);
    window.setInterval(syncDomCursorCellColors, 500);

    // === Focus handling for pure full-screen terminal ===
    // xterm.js only receives keyboard input when it has focus.
    function grabFocus() {
      term.focus();
    }

    // Immediate
    term.focus();

    // Focus handling — do NOT cancel or capture mouse events.
    // xterm.js needs the raw mouse events for TUI application mouse mode (clicking buttons, closing windows, etc.).
    container.addEventListener('mousedown', () => {
      queueMicrotask(() => term.focus());
    }, { passive: true });

    // Also focus the terminal when the browser tab/window regains focus
    window.addEventListener('focus', () => term.focus());

    // Initial fit
    let lastSentCols = 0;
    let lastSentRows = 0;

    function sendResizeIfNeeded() {
      const { cols, rows } = term;
      if (ws && ws.readyState === WebSocket.OPEN && (cols !== lastSentCols || rows !== lastSentRows)) {
        lastSentCols = cols;
        lastSentRows = rows;
        ws.send(JSON.stringify({ type: 'resize', cols, rows }));
      }
    }

    function doFit() {
      try {
        fitAddon.fit();
        sendResizeIfNeeded();
        grabFocus();
      } catch (e) {
        // ignore during init
      }
    }

    // Connect to the real PTY broker (must run under Node, not Bun)
    // The Bun server on :4321 only serves the page. The actual shell lives on :4322.
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ptyHost = location.hostname || 'localhost';
    const wsUrl = `${protocol}//${ptyHost}:4322`;
    let ws;

    function randomSessionId() {
      if (crypto?.randomUUID) return crypto.randomUUID();
      return `tab-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function getPathSessionId() {
      const match = location.pathname.match(/^\/(?:t|session)\/([^/?#]+)/);
      return match ? decodeURIComponent(match[1]) : null;
    }

    function getSessionId() {
      const explicit = params.get('session') || getPathSessionId();
      if (explicit) return explicit;

      const key = 'grok-terminal-session-id';
      let sessionId = sessionStorage.getItem(key);
      if (!sessionId) {
        sessionId = randomSessionId();
        sessionStorage.setItem(key, sessionId);
      }
      return sessionId;
    }

    const sessionId = getSessionId();

    function connect(cwd) {
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        doFit();
        grabFocus();
        // Tell PTY the real size, then start in the selected workspace.
        setTimeout(() => {
          if (ws.readyState === WebSocket.OPEN) {
            const { cols, rows } = term;
            ws.send(JSON.stringify({ type: 'start', sessionId, cols, rows, cwd }));
            grabFocus();
          }
        }, 80);
      };

      ws.onmessage = (event) => {
        term.write(event.data);
        requestAnimationFrame(syncDomCursorCellColors);
      };

      ws.onclose = () => {
        term.write('\r\n\r\n[connection closed — reload tab to reconnect]\r\n');
      };

      ws.onerror = () => {
        term.write('\r\n[connection error]\r\n');
      };
    }

    function insertPtyText(text) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(text);
      }
    }

    async function uploadDroppedFiles(files) {
      const form = new FormData();
      for (const file of files) {
        form.append('files', file);
      }

      const response = await fetch('/attachments', {
        method: 'POST',
        body: form,
      });

      if (!response.ok) {
        throw new Error(await response.text());
      }

      return response.json();
    }

    let dragDepth = 0;

    window.addEventListener('dragenter', (event) => {
      event.preventDefault();
      dragDepth += 1;
      dropOverlay.classList.add('visible');
    });

    window.addEventListener('dragover', (event) => {
      event.preventDefault();
      if (event.dataTransfer) {
        event.dataTransfer.dropEffect = 'copy';
      }
    });

    window.addEventListener('dragleave', (event) => {
      event.preventDefault();
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) {
        dropOverlay.classList.remove('visible');
      }
    });

    window.addEventListener('drop', async (event) => {
      event.preventDefault();
      dragDepth = 0;
      dropOverlay.classList.remove('visible');

      const files = Array.from(event.dataTransfer?.files || []);
      if (files.length === 0) return;

      try {
        const { paths } = await uploadDroppedFiles(files);
        if (Array.isArray(paths) && paths.length > 0) {
          insertPtyText(` ${paths.join(' ')} `);
          grabFocus();
        }
      } catch (error) {
        console.error('[Mission Control] file drop failed', error);
        term.write(`\r\n[file attach failed: ${error?.message || error}]\r\n`);
      }
    });

    // Send user input to the real PTY
    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(data);
      }
    });

    // Handle terminal-driven resize (rare but good)
    term.onResize(({ cols, rows }) => {
      if (ws && ws.readyState === WebSocket.OPEN && (cols !== lastSentCols || rows !== lastSentRows)) {
        lastSentCols = cols;
        lastSentRows = rows;
        ws.send(JSON.stringify({ type: 'resize', cols, rows }));
      }
    });

    // Auto-fit + tell PTY on window resize (important for real terminal feel)
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(doFit, 120);
    });

    // Boot
    const cwdParam = params.get('cwd');
    connect(cwdParam || undefined);

    // One final focus + fit after everything settles
    setTimeout(() => { doFit(); grabFocus(); }, 300);

    // Nice startup banner in the terminal itself (server also sends one)
    // The server will send the initial prompt.

    // Keyboard hint (optional)
    console.log('%c[Mission Control] xterm.js + real local PTY ready. Base colors follow system theme. ANSI/truecolor left to the PTY.', 'color:#555');
  </script>
</body>
</html>
