<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-0</title>
  <link rel="stylesheet" href="/vendor.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      /* Orange accent (shared chrome — cursor, selection, overlays) */
      --mc-accent: #f97316;
      --mc-accent-bright: #fb923c;
      --mc-accent-deep: #ea580c;
      --terminal-edge-bg: #141414;
      --terminal-fg: #e5e5e5;
      --terminal-cursor-bg: var(--mc-accent-bright);
      --terminal-cursor-fg: #141414;
      --terminal-selection: color-mix(in srgb, var(--mc-accent) 35%, #141414);
      color-scheme: dark;
    }
    html[data-theme="light"] {
      --mc-accent: #ea580c;
      --mc-accent-bright: #f97316;
      --mc-accent-deep: #c2410c;
      --terminal-edge-bg: #fafafa;
      --terminal-fg: #171717;
      --terminal-cursor-bg: var(--mc-accent);
      --terminal-cursor-fg: #ffffff;
      --terminal-selection: color-mix(in srgb, var(--mc-accent) 22%, #fafafa);
      color-scheme: light;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      /* Background is driven by JS so the whole tab matches the terminal theme. */
      background: var(--terminal-edge-bg);
      color: var(--terminal-fg);
    }
    #terminal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-synthesis: none;
      font-kerning: none;
      font-variant-ligatures: none;
      letter-spacing: 0;
      word-spacing: 0;
    }
    #terminal,
    #terminal .xterm,
    #terminal .xterm-viewport,
    #terminal .xterm-screen,
    #terminal .xterm-rows {
      background: var(--terminal-edge-bg) !important;
    }
    #terminal .xterm {
      overflow: hidden;
    }
    #terminal .xterm-rows,
    #terminal .xterm-rows span {
      font-kerning: none;
      font-variant-ligatures: none;
      letter-spacing: 0;
      word-spacing: 0;
    }
    @keyframes terminal-dom-block-cursor-blink {
      0% {
        background-color: var(--terminal-cursor-bg);
        color: var(--terminal-cursor-fg);
      }
      50% {
        background-color: var(--terminal-cursor-cell-bg, var(--terminal-edge-bg));
        color: var(--terminal-cursor-cell-fg, inherit);
      }
    }
    #terminal .xterm-rows.xterm-focus .xterm-cursor.xterm-cursor-blink.xterm-cursor-block {
      animation: terminal-dom-block-cursor-blink 1s step-end infinite !important;
    }
    #terminal .xterm-viewport {
      scrollbar-width: none;
    }
    #terminal .xterm-viewport::-webkit-scrollbar {
      width: 0;
      height: 0;
    }
    #drop-overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: color-mix(in srgb, var(--terminal-edge-bg), transparent 18%);
      border: 1px solid var(--mc-accent);
      color: var(--terminal-fg);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--mc-accent) 35%, transparent);
      font: 13px "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      pointer-events: none;
      z-index: 10;
    }
    #drop-overlay.visible {
      display: grid;
    }
    #theme-chip {
      position: fixed;
      right: 10px;
      bottom: 10px;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      border: 1px solid color-mix(in srgb, var(--mc-accent) 55%, transparent);
      background: color-mix(in srgb, var(--terminal-edge-bg) 88%, var(--mc-accent));
      color: var(--terminal-fg);
      border-radius: 999px;
      padding: 4px 10px;
      font: 11px/1.2 "Geist Mono", ui-monospace, Menlo, monospace;
      letter-spacing: 0.02em;
    }
    #theme-chip.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <div id="drop-overlay">Drop files to attach</div>
  <div id="theme-chip" aria-live="polite"></div>

  <script type="module">
    // Bundled locally: terminal pages must not trust remote JavaScript with shell access.
    import { Terminal, FitAddon, WebLinksAddon, CanvasAddon, WebglAddon } from '/vendor.js';

    const THEME_STORAGE_KEY = 'mc-terminal-theme';

    // Orange-accented palettes. ANSI hues stay readable; chrome uses orange.
    const mcNight = {
      background: '#141414',
      foreground: '#e5e5e5',
      cursor: '#fb923c',
      cursorAccent: '#141414',
      selectionBackground: '#5c3416',
      selectionForeground: '#fff7ed',
      black: '#141414',
      red: '#f87171',
      green: '#4ade80',
      yellow: '#fbbf24',
      blue: '#60a5fa',
      magenta: '#c084fc',
      cyan: '#fb923c',
      white: '#e5e5e5',
      brightBlack: '#52525b',
      brightRed: '#fca5a5',
      brightGreen: '#86efac',
      brightYellow: '#fde68a',
      brightBlue: '#93c5fd',
      brightMagenta: '#d8b4fe',
      brightCyan: '#fdba74',
      brightWhite: '#fafafa',
    };

    const mcDay = {
      background: '#fafafa',
      foreground: '#171717',
      cursor: '#ea580c',
      cursorAccent: '#ffffff',
      selectionBackground: '#fed7aa',
      selectionForeground: '#7c2d12',
      black: '#262626',
      red: '#dc2626',
      green: '#16a34a',
      yellow: '#d97706',
      blue: '#2563eb',
      magenta: '#9333ea',
      cyan: '#ea580c',
      white: '#e5e5e5',
      brightBlack: '#737373',
      brightRed: '#ef4444',
      brightGreen: '#22c55e',
      brightYellow: '#f59e0b',
      brightBlue: '#3b82f6',
      brightMagenta: '#a855f7',
      brightCyan: '#f97316',
      brightWhite: '#ffffff',
    };

    const params = new URLSearchParams(location.search);

    function normalizeThemePreference(value) {
      if (value === 'light' || value === 'dark' || value === 'system') return value;
      return null;
    }

    function getThemePreference() {
      const fromQuery = normalizeThemePreference(params.get('theme'));
      if (fromQuery) {
        localStorage.setItem(THEME_STORAGE_KEY, fromQuery);
        return fromQuery;
      }
      return normalizeThemePreference(localStorage.getItem(THEME_STORAGE_KEY)) || 'system';
    }

    let themePreference = getThemePreference();

    function systemIsDark() {
      return window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    function resolveThemeMode() {
      if (themePreference === 'light') return 'light';
      if (themePreference === 'dark') return 'dark';
      return systemIsDark() ? 'dark' : 'light';
    }

    function paletteForMode(mode) {
      return mode === 'light' ? mcDay : mcNight;
    }

    let currentTheme = paletteForMode(resolveThemeMode());
    let themeChipTimer = 0;

    function flashThemeChip(label) {
      const chip = document.getElementById('theme-chip');
      if (!chip) return;
      chip.textContent = label;
      chip.classList.add('visible');
      window.clearTimeout(themeChipTimer);
      themeChipTimer = window.setTimeout(() => chip.classList.remove('visible'), 1400);
    }

    /** @type {import('@xterm/xterm').Terminal | null} */
    let term = null;

    function applyTheme(theme, mode = resolveThemeMode()) {
      currentTheme = theme;
      if (term) {
        term.options.theme = theme;
      }
      const root = document.documentElement;
      root.dataset.theme = mode;
      root.style.background = theme.background;
      document.body.style.background = theme.background;
      root.style.setProperty('--terminal-edge-bg', theme.background);
      root.style.setProperty('--terminal-fg', theme.foreground);
      root.style.setProperty('--terminal-cursor-bg', theme.cursor);
      root.style.setProperty('--terminal-cursor-fg', theme.cursorAccent);
      root.style.colorScheme = mode;
    }

    // Paint chrome before xterm mounts so the first frame isn't a dark flash in light mode.
    applyTheme(currentTheme, resolveThemeMode());

    function setThemePreference(next) {
      themePreference = normalizeThemePreference(next) || 'system';
      localStorage.setItem(THEME_STORAGE_KEY, themePreference);
      const mode = resolveThemeMode();
      applyTheme(paletteForMode(mode), mode);
      flashThemeChip(
        themePreference === 'system'
          ? `theme: system (${mode})`
          : `theme: ${themePreference}`,
      );
    }

    function cycleThemePreference() {
      const order = ['system', 'light', 'dark'];
      const idx = order.indexOf(themePreference);
      setThemePreference(order[(idx + 1) % order.length]);
    }

    function updateThemeFromSystem() {
      if (themePreference !== 'system') return;
      const mode = resolveThemeMode();
      applyTheme(paletteForMode(mode), mode);
    }
    const cursorParam = params.get('cursor');
    const blinkParam = params.get('blink');
    if (cursorParam === 'bar' || cursorParam === 'block' || cursorParam === 'underline') {
      localStorage.setItem('grok-terminal-cursor', cursorParam);
    }
    const cursorStyle = cursorParam === 'bar' || cursorParam === 'underline'
      ? cursorParam
      : 'block';
    if (!cursorParam) {
      localStorage.removeItem('grok-terminal-cursor');
    }

    const FONT_SIZE_KEY = 'mc-terminal-font-size';
    const storedFontSize = Number(localStorage.getItem(FONT_SIZE_KEY));
    const initialFontSize = storedFontSize >= 8 && storedFontSize <= 32 ? storedFontSize : 13;

    term = new Terminal({
      cursorBlink: blinkParam === '1' || blinkParam === 'true',
      cursorStyle,
      fontSize: initialFontSize,
      fontFamily: '"Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace',
      lineHeight: 1,
      letterSpacing: 0,
      mouseEvents: true,
      scrollback: 10000,
      // macOS: Option must act as Meta/Alt so Option+Backspace reaches the PTY as
      // word-delete (otherwise Option often inserts nothing useful / plain Backspace).
      macOptionIsMeta: true,
      fastScrollModifier: 'alt',
      rightClickSelectsWord: false,
      termName: 'xterm-256color',
      drawBoldTextInBrightColors: true,
      minimumContrastRatio: 1,
      customGlyphs: true,
      theme: currentTheme,
      allowTransparency: false,
    });

    const fitAddon = new FitAddon();
    term.loadAddon(fitAddon);

    const container = document.getElementById('terminal');
    const dropOverlay = document.getElementById('drop-overlay');
    term.open(container);
    term.loadAddon(new WebLinksAddon());
    let canvasAddon;
    try {
      const renderer = params.get('renderer');
      if (renderer === 'canvas') {
        canvasAddon = new CanvasAddon();
        term.loadAddon(canvasAddon);
        console.log('%c[T-0] renderer: canvas (forced)', 'color:#555');
      } else if (renderer === 'dom') {
        console.log('%c[T-0] renderer: DOM (forced)', 'color:#555');
      } else {
        const webglAddon = new WebglAddon();
        webglAddon.onContextLoss(() => webglAddon.dispose());
        term.loadAddon(webglAddon);
        console.log('%c[T-0] renderer: WebGL', 'color:#555');
      }
    } catch (error) {
      console.warn('[T-0] renderer addon failed; using DOM renderer', error);
    }

    const cursorProbeClasses = [
      'xterm-cursor',
      'xterm-cursor-blink',
      'xterm-cursor-block',
      'xterm-cursor-bar',
      'xterm-cursor-underline',
      'xterm-cursor-outline',
    ];

    function syncDomCursorCellColors() {
      const cursor = container.querySelector('.xterm-rows .xterm-cursor.xterm-cursor-block');
      if (!cursor || !cursor.parentElement) return;

      const probe = cursor.cloneNode(false);
      for (const className of cursorProbeClasses) {
        probe.classList.remove(className);
      }
      probe.textContent = cursor.textContent || ' ';
      probe.style.animation = 'none';
      probe.style.position = 'absolute';
      probe.style.left = '-9999px';
      probe.style.top = '-9999px';
      probe.style.visibility = 'hidden';
      probe.style.pointerEvents = 'none';

      cursor.parentElement.appendChild(probe);
      const style = getComputedStyle(probe);
      cursor.style.setProperty('--terminal-cursor-cell-bg', style.backgroundColor);
      cursor.style.setProperty('--terminal-cursor-cell-fg', style.color);
      probe.remove();
    }

    // Apply the correct terminal theme + body background immediately after open.
    // Then listen for live system theme changes (user flips OS dark/light mode).
    applyTheme(paletteForMode(resolveThemeMode()), resolveThemeMode());
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateThemeFromSystem);

    // Cycle themes: system → light → dark. Works even when the PTY owns keys,
    // because we listen in capture on window and only handle this chord.
    function setFontSize(px) {
      const size = Math.min(32, Math.max(8, px));
      term.options.fontSize = size;
      localStorage.setItem(FONT_SIZE_KEY, String(size));
      flashThemeChip(`font: ${size}px`);
      doFit();
    }

    window.addEventListener(
      'keydown',
      (event) => {
        if ((event.metaKey || event.ctrlKey) && event.shiftKey && event.key.toLowerCase() === 'l') {
          event.preventDefault();
          event.stopPropagation();
          cycleThemePreference();
          return;
        }
        // ⌘/Ctrl +/-/0 → terminal font size instead of browser zoom
        if ((event.metaKey || event.ctrlKey) && !event.shiftKey && !event.altKey) {
          if (event.key === '=' || event.key === '+') {
            event.preventDefault();
            setFontSize(term.options.fontSize + 1);
          } else if (event.key === '-') {
            event.preventDefault();
            setFontSize(term.options.fontSize - 1);
          } else if (event.key === '0') {
            event.preventDefault();
            setFontSize(13);
          }
        }
      },
      true,
    );

    requestAnimationFrame(syncDomCursorCellColors);
    window.setInterval(syncDomCursorCellColors, 500);

    // === Focus handling for pure full-screen terminal ===
    // xterm.js only receives keyboard input when it has focus.
    function grabFocus() {
      term.focus();
    }

    // Immediate
    term.focus();

    // Focus handling — do NOT cancel or capture mouse events.
    // xterm.js needs the raw mouse events for TUI application mouse mode (clicking buttons, closing windows, etc.).
    container.addEventListener('mousedown', () => {
      queueMicrotask(() => term.focus());
    }, { passive: true });

    // Also focus the terminal when the browser tab/window regains focus
    window.addEventListener('focus', () => term.focus());

    // Bell in a background tab (e.g. an agent wants input) → flag the tab title.
    term.onBell(() => {
      if (document.hidden) document.title = '🔔 T-0';
    });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) document.title = 'T-0';
    });

    // Initial fit
    let lastSentCols = 0;
    let lastSentRows = 0;

    function sendResizeIfNeeded() {
      const { cols, rows } = term;
      if (ws && ws.readyState === WebSocket.OPEN && (cols !== lastSentCols || rows !== lastSentRows)) {
        lastSentCols = cols;
        lastSentRows = rows;
        ws.send(JSON.stringify({ type: 'resize', cols, rows }));
      }
    }

    function doFit() {
      try {
        fitAddon.fit();
        sendResizeIfNeeded();
        grabFocus();
      } catch (e) {
        // ignore during init
      }
    }

    // The PTY is served same-origin at /pty (the Bun server proxies to the
    // Node broker), so this also works behind a fronting proxy like
    // portless (https://t0.localhost).
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${location.host}/pty`;
    let ws;

    function randomSessionId() {
      if (crypto?.randomUUID) return crypto.randomUUID();
      return `tab-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function getPathSessionId() {
      const match = location.pathname.match(/^\/(?:t|session)\/([^/?#]+)/);
      return match ? decodeURIComponent(match[1]) : null;
    }

    function getSessionId() {
      const explicit = params.get('session') || getPathSessionId();
      if (explicit) return explicit;

      const key = 'grok-terminal-session-id';
      let sessionId = sessionStorage.getItem(key);
      if (!sessionId) {
        sessionId = randomSessionId();
        sessionStorage.setItem(key, sessionId);
      }
      return sessionId;
    }

    const sessionId = getSessionId();

    let everConnected = false;
    let reconnectDelay = 500;
    let reconnectTimer;

    function connect(cwd) {
      ws = new WebSocket(wsUrl);
      let opened = false;

      ws.onopen = () => {
        opened = true;
        reconnectDelay = 500;
        if (everConnected) {
          // The broker retains the session and replays history on start.
          term.reset();
          lastSentCols = 0;
          lastSentRows = 0;
        }
        everConnected = true;
        doFit();
        grabFocus();
        // Tell PTY the real size, then start in the selected workspace.
        setTimeout(() => {
          if (ws.readyState === WebSocket.OPEN) {
            const { cols, rows } = term;
            ws.send(JSON.stringify({
              type: 'start',
              sessionId,
              cols,
              rows,
              cwd,
              // Resolved light/dark so mc auto theme matches browser chrome.
              theme: resolveThemeMode(),
            }));
            grabFocus();
          }
        }, 80);
      };

      ws.onmessage = (event) => {
        term.write(event.data);
        requestAnimationFrame(syncDomCursorCellColors);
      };

      ws.onclose = () => {
        if (opened) {
          term.write('\r\n[disconnected — reconnecting…]\r\n');
        }
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(() => connect(cwd), reconnectDelay);
        // ponytail: capped exponential backoff, no jitter — single local client
        reconnectDelay = Math.min(reconnectDelay * 2, 5000);
      };

      ws.onerror = () => {
        // onclose fires after onerror and owns the retry.
      };
    }

    function insertPtyText(text) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(text);
      }
    }

    function sendModifiedEnter(event) {
      if (event.key !== 'Enter' || event.altKey || event.metaKey) return false;
      if (!event.shiftKey && !event.ctrlKey) return false;

      // Browser key events know about Shift/Ctrl, but xterm's default data path
      // sends modified Enter as plain "\r". CSI-u preserves the modifier for
      // TUIs such as Codex that bind Shift+Enter to multiline input.
      const modifier = 1 + (event.shiftKey ? 1 : 0) + (event.ctrlKey ? 4 : 0);
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      insertPtyText(`\x1b[13;${modifier}u`);
      requestAnimationFrame(syncDomCursorCellColors);
      return true;
    }

    async function uploadDroppedFiles(files) {
      const form = new FormData();
      for (const file of files) {
        form.append('files', file);
      }

      const response = await fetch('/attachments', {
        method: 'POST',
        body: form,
      });

      if (!response.ok) {
        throw new Error(await response.text());
      }

      return response.json();
    }

    let dragDepth = 0;

    window.addEventListener('dragenter', (event) => {
      event.preventDefault();
      dragDepth += 1;
      dropOverlay.classList.add('visible');
    });

    window.addEventListener('dragover', (event) => {
      event.preventDefault();
      if (event.dataTransfer) {
        event.dataTransfer.dropEffect = 'copy';
      }
    });

    window.addEventListener('dragleave', (event) => {
      event.preventDefault();
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) {
        dropOverlay.classList.remove('visible');
      }
    });

    window.addEventListener('drop', async (event) => {
      event.preventDefault();
      dragDepth = 0;
      dropOverlay.classList.remove('visible');

      const files = Array.from(event.dataTransfer?.files || []);
      if (files.length === 0) return;

      try {
        const { paths } = await uploadDroppedFiles(files);
        if (Array.isArray(paths) && paths.length > 0) {
          insertPtyText(` ${paths.join(' ')} `);
          grabFocus();
        }
      } catch (error) {
        console.error('[T-0] file drop failed', error);
        term.write(`\r\n[file attach failed: ${error?.message || error}]\r\n`);
      }
    });

    // Send user input to the real PTY
    term.attachCustomKeyEventHandler((event) => {
      if (event.type === 'keydown' && sendModifiedEnter(event)) {
        return false;
      }
      return true;
    });

    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(data);
      }
    });

    // Handle terminal-driven resize (rare but good)
    term.onResize(({ cols, rows }) => {
      if (ws && ws.readyState === WebSocket.OPEN && (cols !== lastSentCols || rows !== lastSentRows)) {
        lastSentCols = cols;
        lastSentRows = rows;
        ws.send(JSON.stringify({ type: 'resize', cols, rows }));
      }
    });

    // Auto-fit + tell PTY on window resize (important for real terminal feel)
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(doFit, 120);
    });

    // Boot
    const cwdParam = params.get('cwd');
    connect(cwdParam || undefined);

    // One final focus + fit after everything settles
    setTimeout(() => { doFit(); grabFocus(); }, 300);

    // Nice startup banner in the terminal itself (server also sends one)
    // The server will send the initial prompt.

    // Keyboard hint (optional)
    console.log(
      '%c[T-0] xterm.js + real local PTY ready. Orange accent. Theme: system/light/dark via ?theme= or ⌘/Ctrl+Shift+L. ANSI/truecolor left to the PTY.',
      'color:#f97316',
    );
  </script>
</body>
</html>
